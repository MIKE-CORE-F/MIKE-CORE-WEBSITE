<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MIKE‑CORE • Article 28 • Lean Six Sigma as Local Optimization (EN)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Mike Verhelst" />
  <meta name="copyright" content="© 2026 MIKE‑CORE / AIEWS — All Rights Reserved" />
  <style>
    :root {
      --bg-main:#050814;--bg-panel:#0b1020;
      --accent-blue:#3aa9ff;--accent-blue-soft:#2a7ac4;
      --accent-silver:#cfd8e3;--text-main:#e5ecf7;--text-soft:#b5c0d4;
      --border-soft:#1b2235;--shadow-soft:0 0 40px rgba(0,0,0,0.6);
      --radius-panel:14px;--radius-chip:999px;
      --font-main:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body {
      margin:0;padding:0;
      background:radial-gradient(circle at top,#101a33 0,#050814 55%,#02030a 100%);
      color:var(--text-main);font-family:var(--font-main);line-height:1.6;
    }
    .page-wrap {max-width:1100px;margin:0 auto;padding:40px 16px 80px;}
    .glass-panel {
      background:radial-gradient(circle at top left,rgba(58,169,255,0.12),transparent 55%),
                 radial-gradient(circle at bottom right,rgba(207,216,227,0.08),transparent 60%),
                 rgba(5,8,20,0.92);
      border-radius:24px;border:1px solid rgba(58,169,255,0.25);
      box-shadow:var(--shadow-soft);padding:32px 26px 40px;position:relative;overflow:hidden;
    }
    .glass-panel::before {
      content:"";position:absolute;inset:-40%;
      background:radial-gradient(circle at 10% 0%,rgba(58,169,255,0.12),transparent 55%),
                 radial-gradient(circle at 90% 100%,rgba(207,216,227,0.10),transparent 55%);
      opacity:.7;pointer-events:none;z-index:-1;
    }
    header.hero {
      text-align:left;margin-bottom:24px;
      border-bottom:1px solid rgba(58,169,255,0.35);padding-bottom:16px;
    }
    .hero-kicker {
      display:inline-flex;align-items:center;gap:8px;
      padding:4px 14px;border-radius:var(--radius-chip);
      background:linear-gradient(90deg,rgba(58,169,255,0.18),rgba(207,216,227,0.12));
      color:var(--accent-silver);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    }
    .hero-kicker-dot {
      width:8px;height:8px;border-radius:50%;
      background:radial-gradient(circle,#3aa9ff,#2a7ac4);
      box-shadow:0 0 10px rgba(58,169,255,0.9);
    }
    .hero-title {font-size:26px;margin:14px 0 4px;text-transform:uppercase;}
    .hero-subtitle {font-size:14px;color:var(--text-soft);max-width:640px;}
    .footer-note {margin-top:18px;font-size:11px;color:#7b8496;text-align:right;}
    svg text {font-family:var(--font-main);}
  </style>
</head>
<body>
<div class="page-wrap">
<div class="glass-panel">

<header class="hero">
  <div class="hero-kicker">
    <span class="hero-kicker-dot"></span>
    <span>MIKE‑CORE • VISUAL CARD</span>
  </div>
  <h1 class="hero-title">Lean Six Sigma as Local Optimization</h1>
  <p class="hero-subtitle">
    Visual map showing Lean Six Sigma as a local optimization ritual within the MIKE‑CORE ecosystem, not as global architecture.
  </p>
</header>

<svg viewBox="0 0 900 520" width="100%" height="auto">
  <!-- Left: Lean / Six Sigma bubble -->
  <defs>
    <radialGradient id="bubbleGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3aa9ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050814" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Ecosystem frame -->
  <rect x="60" y="80" width="780" height="360" rx="18"
        fill="#050814" stroke="#3aa9ff" stroke-width="1.2"/>

  <text x="70" y="105" fill="#cfd8e3" font-size="13" font-weight="600">
    MIKE‑CORE ECOSYSTEM (TRIAD + HEXAD)
  </text>

  <!-- Local optimization zone -->
  <rect x="90" y="140" width="320" height="260" rx="16"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1.1"/>
  <text x="250" y="165" text-anchor="middle" fill="#e5ecf7" font-size="13" font-weight="600">
    LOCAL OPTIMIZATION ZONE
  </text>
  <text x="250" y="182" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Stable, predictable, low‑risk subsystem
  </text>

  <!-- Lean / Six Sigma bubble -->
  <circle cx="250" cy="270" r="95" fill="url(#bubbleGrad)" stroke="#3aa9ff" stroke-width="1.2"/>
  <text x="250" y="250" text-anchor="middle" fill="#e5ecf7" font-size="14" font-weight="700">
    LEAN / SIX SIGMA
  </text>
  <text x="250" y="270" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Flow + variance reduction
  </text>
  <text x="250" y="290" text-anchor="middle" fill="#b5c0d4" font-size="10">
    Works only if assumptions hold
  </text>

  <!-- Assumptions list -->
  <text x="120" y="325" fill="#cfd8e3" font-size="11" font-weight="600">ASSUMPTIONS</text>
  <text x="120" y="342" fill="#b5c0d4" font-size="10">• Stable environment</text>
  <text x="120" y="357" fill="#b5c0d4" font-size="10">• Predictable processes</text>
  <text x="120" y="372" fill="#b5c0d4" font-size="10">• Linear cause‑effect</text>
  <text x="120" y="387" fill="#b5c0d4" font-size="10">• Repeatable workflows</text>

  <!-- Right: TRIAD / HEXAD core -->
  <rect x="460" y="140" width="350" height="260" rx="16"
        fill="#050814" stroke="#3aa9ff" stroke-width="1.1"/>
  <text x="635" y="165" text-anchor="middle" fill="#e5ecf7" font-size="13" font-weight="600">
    TRIAD / HEXAD CORE
  </text>
  <text x="635" y="182" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Global stability & architecture
  </text>

  <!-- TRIAD axes -->
  <text x="485" y="215" fill="#cfd8e3" font-size="11" font-weight="600">TRIAD AXES</text>
  <text x="485" y="232" fill="#b5c0d4" font-size="10">I — Information Flow</text>
  <text x="485" y="247" fill="#b5c0d4" font-size="10">R — Risk & Stability</text>
  <text x="485" y="262" fill="#b5c0d4" font-size="10">T — Transformation</text>

  <!-- Mapping Lean to TRIAD -->
  <rect x="520" y="280" width="260" height="90" rx="10"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1"/>
  <text x="650" y="300" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    LEAN / SIX SIGMA → TRIAD
  </text>
  <text x="530" y="318" fill="#b5c0d4" font-size="10">• I‑axis: improves local flow (valid)</text>
  <text x="530" y="333" fill="#b5c0d4" font-size="10">• R‑axis: reduces local variance (valid)</text>
  <text x="530" y="348" fill="#b5c0d4" font-size="10">• T‑axis: no structural change (invalid)</text>

  <!-- Arrow: local → ecosystem -->
  <line x1="410" y1="270" x2="460" y2="270" stroke="#3aa9ff" stroke-width="1.4" marker-end="url(#arrowHead)"/>

  <defs>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#3aa9ff"/>
    </marker>
  </defs>

  <text x="435" y="260" text-anchor="middle" fill="#b5c0d4" font-size="10">
    cannot scale
  </text>

  <!-- Bottom note -->
  <text x="450" y="430" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Lean Six Sigma = local optimization ritual • not ecosystem architecture
  </text>
</svg>
