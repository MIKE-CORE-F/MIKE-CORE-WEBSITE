<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>MIKE‑CORE • TRIAD 3‑Layer Map (NL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Mike Verhelst" />
  <meta name="copyright" content="© 2026 MIKE‑CORE / AIEWS — All Rights Reserved" />
  <style>
    :root {
      --bg-main:#050814;--bg-panel:#0b1020;
      --accent-blue:#3aa9ff;--accent-blue-soft:#2a7ac4;
      --accent-silver:#cfd8e3;--text-main:#e5ecf7;--text-soft:#b5c0d4;
      --border-soft:#1b2235;--shadow-soft:0 0 40px rgba(0,0,0,0.6);
      --radius-panel:14px;--radius-chip:999px;
      --font-main:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body {
      margin:0;padding:0;
      background:radial-gradient(circle at top,#101a33 0,#050814 55%,#02030a 100%);
      color:var(--text-main);font-family:var(--font-main);line-height:1.6;
    }
    .page-wrap {max-width:1100px;margin:0 auto;padding:40px 16px 80px;}
    .glass-panel {
      background:radial-gradient(circle at top left,rgba(58,169,255,0.12),transparent 55%),
                 radial-gradient(circle at bottom right,rgba(207,216,227,0.08),transparent 60%),
                 rgba(5,8,20,0.92);
      border-radius:24px;border:1px solid rgba(58,169,255,0.25);
      box-shadow:var(--shadow-soft);padding:32px 26px 40px;position:relative;overflow:hidden;
    }
    .glass-panel::before {
      content:"";position:absolute;inset:-40%;
      background:radial-gradient(circle at 10% 0%,rgba(58,169,255,0.12),transparent 55%),
                 radial-gradient(circle at 90% 100%,rgba(207,216,227,0.10),transparent 55%);
      opacity:.7;pointer-events:none;z-index:-1;
    }
    header.hero {
      text-align:left;margin-bottom:24px;
      border-bottom:1px solid rgba(58,169,255,0.35);padding-bottom:16px;
    }
    .hero-kicker {
      display:inline-flex;align-items:center;gap:8px;
      padding:4px 14px;border-radius:var(--radius-chip);
      background:linear-gradient(90deg,rgba(58,169,255,0.18),rgba(207,216,227,0.12));
      color:var(--accent-silver);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    }
    .hero-kicker-dot {
      width:8px;height:8px;border-radius:50%;
      background:radial-gradient(circle,#3aa9ff,#2a7ac4);
      box-shadow:0 0 10px rgba(58,169,255,0.9);
    }
    .hero-title {font-size:28px;margin:14px 0 4px;text-transform:uppercase;}
    .hero-subtitle {font-size:14px;color:var(--text-soft);max-width:640px;}
    .footer-note {margin-top:18px;font-size:11px;color:#7b8496;text-align:right;}
    svg text {font-family:var(--font-main);}
  </style>
</head>
<body>
<div class="page-wrap">
<div class="glass-panel">

<header class="hero">
  <div class="hero-kicker">
    <span class="hero-kicker-dot"></span>
    <span>MIKE‑CORE • VISUELE KAART</span>
  </div>
  <h1 class="hero-title">TRIAD • 3‑Layer Map</h1>
  <p class="hero-subtitle">
    Visuele kaart van de drie structurele lagen van TRIAD (Kern, Operationeel, Ecosysteem) en de I‑R‑T‑assen,
    in lijn met de AIEWS‑ecosysteemstijl.
  </p>
</header>

<svg viewBox="0 0 900 540" width="100%" height="auto">
  <defs>
    <linearGradient id="layerGradNL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3aa9ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#050814" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="glowCore" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#3aa9ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050814" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtiele achtergrondglow -->
  <rect x="90" y="90" width="770" height="360" fill="url(#glowCore)" opacity="0.35"/>

  <!-- Aslabels links -->
  <text x="40" y="140" fill="#cfd8e3" font-size="13" font-weight="600">I‑AS</text>
  <text x="40" y="270" fill="#cfd8e3" font-size="13" font-weight="600">R‑AS</text>
  <text x="40" y="400" fill="#cfd8e3" font-size="13" font-weight="600">T‑AS</text>

  <!-- Horizontale hulplijnen -->
  <line x1="90" y1="135" x2="860" y2="135" stroke="#1b2235" stroke-width="1"/>
  <line x1="90" y1="265" x2="860" y2="265" stroke="#1b2235" stroke-width="1"/>
  <line x1="90" y1="395" x2="860" y2="395" stroke="#1b2235" stroke-width="1"/>

  <!-- Laaglabels bovenaan -->
  <text x="210" y="105" fill="#cfd8e3" font-size="13" font-weight="600">KERNLAAG</text>
  <text x="440" y="105" fill="#cfd8e3" font-size="13" font-weight="600">OPERATIONELE LAAG</text>
  <text x="700" y="105" fill="#cfd8e3" font-size="13" font-weight="600">ECOSYSTEEMLAAG</text>

  <!-- Verticale scheidingslijnen -->
  <line x1="320" y1="115" x2="320" y2="430" stroke="#1b2235" stroke-width="1"/>
  <line x1="580" y1="115" x2="580" y2="430" stroke="#1b2235" stroke-width="1"/>

  <!-- KERNLAAG blokken (links) -->
  <rect x="130" y="115" width="180" height="70" rx="10"
        fill="url(#layerGradNL)" stroke="#3aa9ff" stroke-width="1.2"/>
  <text x="220" y="138" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    I: INFORMATIEGRENZEN
  </text>
  <text x="220" y="156" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Helderheid, scope, ruisfilter
  </text>

  <rect x="130" y="245" width="180" height="70" rx="10"
        fill="url(#layerGradNL)" stroke="#3aa9ff" stroke-width="1.2"/>
  <text x="220" y="268" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    R: STABILITEITSREGELS
  </text>
  <text x="220" y="286" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Risico, validatie, grenzen
  </text>

  <rect x="130" y="375" width="180" height="70" rx="10"
        fill="url(#layerGradNL)" stroke="#3aa9ff" stroke-width="1.2"/>
  <text x="220" y="398" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    T: TRANSFORMATIELIMITEN
  </text>
  <text x="220" y="416" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Wat mag veranderen, wat nooit
  </text>

  <!-- OPERATIONELE LAAG blokken (midden) -->
  <rect x="350" y="115" width="200" height="70" rx="10"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1.1"/>
  <text x="450" y="138" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    I IN OPERATIES
  </text>
  <text x="450" y="156" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Teams, overdracht, documentatie
  </text>

  <rect x="350" y="245" width="200" height="70" rx="10"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1.1"/>
  <text x="450" y="268" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    R IN OPERATIES
  </text>
  <text x="450" y="286" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Incidenten, controles, monitoring
  </text>

  <rect x="350" y="375" width="200" height="70" rx="10"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1.1"/>
  <text x="450" y="398" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    T IN OPERATIES
  </text>
  <text x="450" y="416" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Wijzigingen, releases, migraties
  </text>

  <!-- ECOSYSTEEMLAAG blokken (rechts) -->
  <rect x="610" y="115" width="220" height="70" rx="10"
        fill="#050814" stroke="#3aa9ff" stroke-width="1.1"/>
  <text x="720" y="138" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    I IN HET ECOSYSTEEM
  </text>
  <text x="720" y="156" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Domeinoverschrijdende informatiestromen
  </text>

  <rect x="610" y="245" width="220" height="70" rx="10"
        fill="#050814" stroke="#3aa9ff" stroke-width="1.1"/>
  <text x="720" y="268" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    R IN HET ECOSYSTEEM
  </text>
  <text x="720" y="286" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Globale stabiliteit & risicogebieden
  </text>

  <rect x="610" y="375" width="220" height="70" rx="10"
        fill="#050814" stroke="#3aa9ff" stroke-width="1.1"/>
  <text x="720" y="398" text-anchor="middle" fill="#e5ecf7" font-size="12" font-weight="600">
    T IN HET ECOSYSTEEM
  </text>
  <text x="720" y="416" text-anchor="middle" fill="#b5c0d4" font-size="11">
    Ecosysteem‑veilige transformatie
  </text>

  <!-- Pijlen van kern → operatie → ecosysteem -->
  <defs>
    <marker id="arrowTriadNL" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#3aa9ff"/>
    </marker>
  </defs>

  <!-- I‑as pijlen -->
  <line x1="310" y1="150" x2="350" y2="150"
        stroke="#3aa9ff" stroke-width="1.3" marker-end="url(#arrowTriadNL)"/>
  <line x1="550" y1="150" x2="610" y2="150"
        stroke="#3aa9ff" stroke-width="1.3" marker-end="url(#arrowTriadNL)"/>

  <!-- R‑as pijlen -->
  <line x1="310" y1="280" x2="350" y2="280"
        stroke="#3aa9ff" stroke-width="1.3" marker-end="url(#arrowTriadNL)"/>
  <line x1="550" y1="280" x2="610" y2="280"
        stroke="#3aa9ff" stroke-width="1.3" marker-end="url(#arrowTriadNL)"/>

  <!-- T‑as pijlen -->
  <line x1="310" y1="410" x2="350" y2="410"
        stroke="#3aa9ff" stroke-width="1.3" marker-end="url(#arrowTriadNL)"/>
  <line x1="550" y1="410" x2="610" y2="410"
        stroke="#3aa9ff" stroke-width="1.3" marker-end="url(#arrowTriadNL)"/>

  <!-- Legende onderaan -->
  <rect x="90" y="455" width="14" height="14" rx="3"
        fill="url(#layerGradNL)" stroke="#3aa9ff" stroke-width="1"/>
  <text x="112" y="466" fill="#b5c0d4" font-size="11">TRIAD‑kernregels</text>

  <rect x="260" y="455" width="14" height="14" rx="3"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1"/>
  <text x="282" y="466" fill="#b5c0d4" font-size="11">Toepassing in operaties</text>

  <rect x="460" y="455" width="14" height="14" rx="3"
        fill="#050814" stroke="#3aa9ff" stroke-width="1"/>
  <text x="482" y="466" fill="#b5c0d4" font-size="11">Ecosysteemgovernance</text>

  <text x="720" y="466" text-anchor="end" fill="#7b8496" font-size="10">
    TRIAD = kernregels • lagen = toepassing • ecosysteem = grenzen van impact
  </text>
</svg>

<div class="footer-note">

</div>

</div>
</div>
</body>
</html>
