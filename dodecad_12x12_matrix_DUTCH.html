<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>MIKE‑CORE • Dodecad 12×12 Matrix (NL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Mike Verhelst" />
  <meta name="copyright" content="© 2026 MIKE‑CORE / AIEWS — All Rights Reserved" />
  <style>
    :root {
      --bg-main:#050814;--accent-blue:#3aa9ff;--accent-silver:#cfd8e3;
      --text-main:#e5ecf7;--text-soft:#b5c0d4;--border-soft:#1b2235;
      --shadow-soft:0 0 40px rgba(0,0,0,0.6);--radius-panel:14px;--radius-chip:999px;
      --font-main:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body {margin:0;padding:0;background:radial-gradient(circle at top,#101a33 0,#050814 55%,#02030a 100%);color:var(--text-main);font-family:var(--font-main);line-height:1.6;}
    .page-wrap {max-width:1100px;margin:0 auto;padding:40px 16px 80px;}
    .glass-panel {background:radial-gradient(circle at top left,rgba(58,169,255,0.12),transparent 55%),radial-gradient(circle at bottom right,rgba(207,216,227,0.08),transparent 60%),rgba(5,8,20,0.92);border-radius:24px;border:1px solid rgba(58,169,255,0.25);box-shadow:var(--shadow-soft);padding:32px 26px 40px;position:relative;overflow:hidden;}
    .glass-panel::before {content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 10% 0%,rgba(58,169,255,0.12),transparent 55%),radial-gradient(circle at 90% 100%,rgba(207,216,227,0.10),transparent 55%);opacity:.7;pointer-events:none;z-index:-1;}
    header.hero {text-align:left;margin-bottom:24px;border-bottom:1px solid rgba(58,169,255,0.35);padding-bottom:16px;}
    .hero-kicker {display:inline-flex;align-items:center;gap:8px;padding:4px 14px;border-radius:var(--radius-chip);background:linear-gradient(90deg,rgba(58,169,255,0.18),rgba(207,216,227,0.12));color:var(--accent-silver);font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
    .hero-kicker-dot {width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#3aa9ff,#2a7ac4);box-shadow:0 0 10px rgba(58,169,255,0.9);}
    .hero-title {font-size:26px;margin:14px 0 4px;text-transform:uppercase;}
    .hero-subtitle {font-size:14px;color:var(--text-soft);max-width:640px;}
    .footer-note {margin-top:18px;font-size:11px;color:#7b8496;text-align:right;}
    svg text {font-family:var(--font-main);}
  </style>
</head>
<body>
<div class="page-wrap">
<div class="glass-panel">

<header class="hero">
  <div class="hero-kicker">
    <span class="hero-kicker-dot"></span>
    <span>MIKE‑CORE • VISUELE MATRIX</span>
  </div>
  <h1 class="hero-title">Dodecad • 12×12 Matrix</h1>
  <p class="hero-subtitle">
    Conceptuele 12×12 matrix om domeinen, risico’s en transformaties te positioneren binnen het MIKE‑CORE‑ecosysteem.
  </p>
</header>

<svg viewBox="0 0 900 520" width="100%" height="auto">
  <rect x="120" y="80" width="680" height="360" rx="12"
        fill="#050814" stroke="#3aa9ff" stroke-width="1.2"/>

  <g stroke="#1b2235" stroke-width="0.7">
    <line x1="176.7" y1="80" x2="176.7" y2="440"/>
    <line x1="233.3" y1="80" x2="233.3" y2="440"/>
    <line x1="290.0" y1="80" x2="290.0" y2="440"/>
    <line x1="346.7" y1="80" x2="346.7" y2="440"/>
    <line x1="403.3" y1="80" x2="403.3" y2="440"/>
    <line x1="460.0" y1="80" x2="460.0" y2="440"/>
    <line x1="516.7" y1="80" x2="516.7" y2="440"/>
    <line x1="573.3" y1="80" x2="573.3" y2="440"/>
    <line x1="630.0" y1="80" x2="630.0" y2="440"/>
    <line x1="686.7" y1="80" x2="686.7" y2="440"/>
    <line x1="743.3" y1="80" x2="743.3" y2="440"/>

    <line x1="120" y1="110" x2="800" y2="110"/>
    <line x1="120" y1="140" x2="800" y2="140"/>
    <line x1="120" y1="170" x2="800" y2="170"/>
    <line x1="120" y1="200" x2="800" y2="200"/>
    <line x1="120" y1="230" x2="800" y2="230"/>
    <line x1="120" y1="260" x2="800" y2="260"/>
    <line x1="120" y1="290" x2="800" y2="290"/>
    <line x1="120" y1="320" x2="800" y2="320"/>
    <line x1="120" y1="350" x2="800" y2="350"/>
    <line x1="120" y1="380" x2="800" y2="380"/>
    <line x1="120" y1="410" x2="800" y2="410"/>
  </g>

  <text x="120" y="65" fill="#cfd8e3" font-size="13" font-weight="600">
    X‑AS • DOMEINEN (1–12)
  </text>
  <text x="40" y="260" fill="#cfd8e3" font-size="13" font-weight="600"
        transform="rotate(-90 40 260)">
    Y‑AS • RISICO / TRANSFORMATIE (1–12)
  </text>

  <rect x="176.7" y="140" width="56.6" height="30"
        fill="#0b1020" stroke="#3aa9ff" stroke-width="1"/>
  <text x="205" y="160" fill="#e5ecf7" font-size="9" text-anchor="middle">KERN</text>

  <rect x="346.7" y="230" width="56.6" height="30"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1"/>
  <text x="375" y="250" fill="#e5ecf7" font-size="9" text-anchor="middle">OPERATIE</text>

  <rect x="630.0" y="350" width="56.6" height="30"
        fill="#050814" stroke="#3aa9ff" stroke-width="1"/>
  <text x="658" y="370" fill="#e5ecf7" font-size="9" text-anchor="middle">ECOSYSTEEM</text>

  <rect x="120" y="460" width="14" height="14" rx="3"
        fill="#0b1020" stroke="#3aa9ff" stroke-width="1"/>
  <text x="140" y="471" fill="#b5c0d4" font-size="11">Kern‑kritieke kruisingen</text>

  <rect x="320" y="460" width="14" height="14" rx="3"
        fill="#0b1020" stroke="#2a7ac4" stroke-width="1"/>
  <text x="340" y="471" fill="#b5c0d4" font-size="11">Operationele focuszones</text>

  <rect x="540" y="460" width="14" height="14" rx="3"
        fill="#050814" stroke="#3aa9ff" stroke-width="1"/>
  <text x="560" y="471" fill="#b5c0d4" font-size="11">Ecosysteem‑gevoelige zones</text>
</svg>

<div class="footer-note">
  © 2026 MIKE‑CORE / AIEWS — All Rights Reserved
</div>

</div>
</div>
</body>
</html>
